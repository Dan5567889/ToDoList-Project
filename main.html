<html>

        <title>To-Do list page display</title>

        <link rel="stylesheet" href="main2.css">
    </head>
    <body>
       <nav class="nav-desktop">
        <div class="navTitle"> 
            <a href="main.html">
        <img src="Assets/Logo.png" alt="CheckMate Logo" class="logo">
        </a>
        <h2>CheckMate</h2>
        </div>
        <ul>
            <li><a href="settings.html">Settings</a></li>
            <li><a href="home.html">Sign Out </a></li>

    </nav>

    <nav class="nav-mobile">
        <div class="navTitle"> 
            <a href="main.html">
                <img src="Assets/Logo.png" alt="CheckMate Logo" class="logo">
                </a>
                <h2>CheckMate</h2>
            </div>
            <div class="dropdown">
                <img src="Assets/menu.png" alt="CheckMate Logo" class="dropbtn">
                <div class="dropdown-content">
                  <a href="settings.html">Settings</a>
                  <a href="home.html">Sign Out</a>

        <div class="taskCreate">
            <h2>Add New Task</h2>
            <form>
                <input type="text" id="taskName" class="standardInpt" placeholder="Enter Task Name">
                <input type="date" id="ETC" class="standardInpt" placeholder="Enter Expected Due Date">
                
                <!-- Dropdown for status -->
                <select id="status" class="standardInpt">
                    <option value="not-started">Not Started</option>
                    <option value="in-progress">In Progress</option>
                    <option value="near-completion">Near Completion</option>
                </select>
                
                <input type="text" id="priority" class="standardInpt" placeholder="Enter Priority Filling">
                <button type="submit" id="submit">Submit New Task</button>
            </form>
        </div>
        <div class="taskDisplay">
        <h2>Current Tasks:</h2>
            <ul id="list">                
            </ul>
            </div>
        </div>
        <div class="taskManager">
            <h2>Manage Tasks</h2>
            <form>
                <input type="text" id="taskID" class="standardInpt" placeholder="Enter Task ID">
                <button id="complete" >Mark As Complete</button>
                <button id="progress" >Mark As In Progress</button>
                <button id="delete" >Delete Task</button>
            </form>
        </div>
        <script type="module" src="main.js"></script>
        <script type="module" src="settings.js"></script>
    </body>
</html>
