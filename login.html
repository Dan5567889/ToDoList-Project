<!DOCTYPE html>
<html>
    <head>
        <title> Login </title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Login page for the website">
        <link rel="stylesheet" href="loginSignUp.css">
        <link rel="stylesheet" href="main.css">
    </head>
    <body>
        <nav class="nav-desktop">
            <div class="navTitle"> 
            <img src="Assets/Logo.png" alt="CheckMate Logo" class="logo">
            <h2>CheckMate</h2>
            </div>
            <ul>
                <li><a href="login.html">Login</a></li>
                <li><a href="signUp.html">Sign Up </a></li>
            </ul>
        </nav>
    
        <nav class="nav-mobile">
            <div class="navTitle"> 
                <img src="Assets/Logo.png" alt="CheckMate Logo" class="logo">
                <h2>CheckMate</h2>
                </div>
                <div class="dropdown">
                    <img src="Assets/menu.png" alt="CheckMate Logo" class="dropbtn">
                    <div class="dropdown-content">
                      <a href="login.html">Login</a>
                      <a href="signUp.html">Sign up</a>
                    </div>
                  </div>
        </nav>

        <div class="container">
            <form id="loginForm">

            <h4 > <label for="email" class="email-button">Email</label></h4>
            <input type="email" id="email" name="email" placeholder="Enter Email (must have @)">
            
            
            <h4><label for="password" class="password-button">Password</label></h4>
            <input type="password" id="password" name="password" placeholder="Enter Password (8 Characters Long)">

            <br>
            <br>
            <h4>Don't have an Account Already? <a href="signUp.html">Signup</a></h4>
            <br>
            <br>
            <button  type="submit" id="login" >Login</button>
            </form>
            <script type="module" src="login.js"></script>
        </div>
        <script type="module" src="settings.js"></script>
    </body>
</html>
